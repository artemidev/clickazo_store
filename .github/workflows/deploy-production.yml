name: Deploy Production

permissions:
  contents: read
  packages: write

concurrency:
  group: deploy-production
  cancel-in-progress: true

on:
  push:
    tags:
      - 'v*'

jobs:
  # ---------------------------------------------------------------------------
  # Quality gate – install, lint and run unit tests before building the image
  # ---------------------------------------------------------------------------
  # quality:
  #   runs-on: ubuntu-latest
  #   steps:
  #     - name: Git Checkout
  #       uses: actions/checkout@v4
  #
  #     - name: Setup Node.js
  #       uses: actions/setup-node@v4
  #       with:
  #         node-version: "20"
  #         cache: 'pnpm'
  #
  #     - name: Setup pnpm
  #       uses: pnpm/action-setup@v4
  #       with:
  #         version: 10.11.1
  #         run_install: false
  #
  #     - name: Install Dependencies
  #       run: pnpm install --frozen-lockfile
  #
  #     - name: Run Linter
  #       run: pnpm lint
  #
  #     - name: Run Tests
  #       run: pnpm test:unit

  # ---------------------------------------------------------------------------
  # Build production Docker image and deploy to Dokploy
  # ---------------------------------------------------------------------------
  deploy-production:
    #needs: quality
    runs-on: ubuntu-latest
    steps:
      - name: Git Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract tag name
        id: tag
        run: echo "TAG=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.prod
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/clickazo-store:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/clickazo-store:${{ steps.tag.outputs.TAG }}
            ${{ secrets.DOCKERHUB_USERNAME }}/clickazo-store:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

      - name: Trigger Dokploy Backend deployment
        env:
          WEBHOOK_URL: ${{ secrets.DOKPLOY_BACKEND_WEBHOOK_URL }}
        if: env.WEBHOOK_URL != ''
        run: |
          echo "Triggering Dokploy backend deployment..."
          curl -s -o /dev/null -w "%{http_code}" \
            -X POST "$WEBHOOK_URL"

      - name: Trigger Dokploy Storefront deployment
        env:
          WEBHOOK_URL: ${{ secrets.DOKPLOY_STOREFRONT_WEBHOOK_URL }}
        if: env.WEBHOOK_URL != ''
        run: |
          echo "Triggering Dokploy storefront deployment..."
          curl -s -o /dev/null -w "%{http_code}" \
            -X POST "$WEBHOOK_URL"
