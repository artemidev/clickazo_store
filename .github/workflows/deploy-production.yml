name: Deploy Production

permissions:
  contents: read
  packages: write

concurrency:
  group: deploy-production
  cancel-in-progress: true

on:
  push:
    tags:
      - 'v*'

jobs:
  # ---------------------------------------------------------------------------
  # Quality gate – install, lint and run unit tests before building the image
  # ---------------------------------------------------------------------------
  # quality:
  #   runs-on: ubuntu-latest
  #   steps:
  #     - name: Git Checkout
  #       uses: actions/checkout@v4
  #
  #     - name: Setup Node.js
  #       uses: actions/setup-node@v4
  #       with:
  #         node-version: "20"
  #         cache: 'pnpm'
  #
  #     - name: Setup pnpm
  #       uses: pnpm/action-setup@v4
  #       with:
  #         version: 10.11.1
  #         run_install: false
  #
  #     - name: Install Dependencies
  #       run: pnpm install --frozen-lockfile
  #
  #     - name: Run Linter
  #       run: pnpm lint
  #
  #     - name: Run Tests
  #       run: pnpm test:unit

  # ---------------------------------------------------------------------------
  # Build production Docker image and deploy to Dokploy
  # ---------------------------------------------------------------------------
  deploy-production:
    #needs: quality
    runs-on: ubuntu-latest
    steps:
      - name: Git Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract tag name
        id: tag
        run: echo "TAG=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./docker/backend.Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/clickazo-store-backend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/clickazo-store-backend:${{ steps.tag.outputs.TAG }}
            ${{ secrets.DOCKERHUB_USERNAME }}/clickazo-store-backend:${{ github.sha }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend
          platforms: linux/amd64

      # - name: Build and push storefront image
      #   uses: docker/build-push-action@v6
      #   with:
      #     context: .
      #     file: ./docker/storefront.Dockerfile
      #     push: true
      #     tags: |
      #       ${{ secrets.DOCKERHUB_USERNAME }}/clickazo-storefront:latest
      #       ${{ secrets.DOCKERHUB_USERNAME }}/clickazo-storefront:${{ steps.tag.outputs.TAG }}
      #       ${{ secrets.DOCKERHUB_USERNAME }}/clickazo-storefront:${{ github.sha }}
      #     # NEXT_PUBLIC_* are inlined at build time, so they must be passed here
      #     build-args: |
      #       NEXT_PUBLIC_MEDUSA_BACKEND_URL=${{ secrets.MEDUSA_BACKEND_URL }}
      #       NEXT_PUBLIC_MEDUSA_PUBLISHABLE_KEY=${{ secrets.MEDUSA_PUBLISHABLE_KEY }}
      #       NEXT_PUBLIC_DEFAULT_REGION=${{ vars.NEXT_PUBLIC_DEFAULT_REGION }}
      #       NEXT_PUBLIC_BASE_URL=${{ secrets.STOREFRONT_BASE_URL }}
      #       NEXT_PUBLIC_STRIPE_KEY=${{ secrets.STRIPE_PUBLISHABLE_KEY }}
      #     cache-from: type=gha,scope=storefront
      #     cache-to: type=gha,mode=max,scope=storefront
      #     platforms: linux/amd64

      # The backend image is built once and reused by two Dokploy services that
      # differ only by runtime env (MEDUSA_WORKER_MODE / DISABLE_MEDUSA_ADMIN):
      #   - server: MEDUSA_WORKER_MODE=server, DISABLE_MEDUSA_ADMIN=false
      #   - worker: MEDUSA_WORKER_MODE=worker, DISABLE_MEDUSA_ADMIN=true
      # Both must be redeployed on every release
      - name: Trigger Dokploy server deployment
        env:
          WEBHOOK_URL: ${{ secrets.DOKPLOY_BACKEND_WEBHOOK_URL }}
        if: env.WEBHOOK_URL != ''
        run: |
          echo "Triggering Dokploy server deployment..."
          curl -s -o /dev/null -w "%{http_code}" \
            -X POST "$WEBHOOK_URL"

      - name: Trigger Dokploy worker deployment
        env:
          WEBHOOK_URL: ${{ secrets.DOKPLOY_WORKER_WEBHOOK_URL }}
        if: env.WEBHOOK_URL != ''
        run: |
          echo "Triggering Dokploy worker deployment..."
          curl -s -o /dev/null -w "%{http_code}" \
            -X POST "$WEBHOOK_URL"

      # - name: Trigger Dokploy Storefront deployment
