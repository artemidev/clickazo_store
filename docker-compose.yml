services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: medusa_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: medusa-store
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - medusa_network

  # Redis
  redis:
    image: redis:7-alpine
    container_name: medusa_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - medusa_network

  # Meilisearch
  # Search engine backing the @rokmohar/medusa-plugin-meilisearch plugin.
  meilisearch:
    image: getmeili/meilisearch:v1.13
    container_name: medusa_meilisearch
    restart: unless-stopped
    environment:
      MEILI_MASTER_KEY: devMasterKey
      MEILI_ENV: development
    ports:
      - "7700:7700"
    volumes:
      - meili_data:/meili_data
    networks:
      - medusa_network

  # Meilisearch admin dashboard (development only).
  # Browse indexes/documents at http://localhost:24900.
  meilisearch-ui:
    image: riccoxie/meilisearch-ui:latest
    container_name: medusa_meilisearch_ui
    restart: unless-stopped
    depends_on:
      - meilisearch
    environment:
      SINGLETON_MODE: "true"
      SINGLETON_HOST: http://localhost:7700
      SINGLETON_API_KEY: devMasterKey
    ports:
      - "24900:24900"
    networks:
      - medusa_network

  # Medusa Server
  # This service runs the Medusa backend application
  # and the admin dashboard.
  medusa:
    build:
      context: .
      dockerfile: docker/dev.Dockerfile
    container_name: medusa_backend
    restart: unless-stopped
    depends_on:
      - postgres
      - redis
      - meilisearch
    ports:
      - "9000:9000"
      - "5173:5173"
    environment:
      - NODE_ENV=development
      - DATABASE_URL=postgres://postgres:postgres@postgres:5432/medusa-store
      - REDIS_URL=redis://redis:6379
      - MEILISEARCH_HOST=http://meilisearch:7700
      - MEILISEARCH_API_KEY=devMasterKey
    entrypoint: ["sh", "scripts/dev-backend.sh"]
    env_file:
      - apps/backend/.env
    volumes:
      - .:/server
      - /server/node_modules
      - /server/apps/backend/node_modules
    networks:
      - medusa_network

  # Storefront
  # This service runs the Next.js Starter Storefront
  storefront:
    build:
      context: .
      dockerfile: docker/dev.Dockerfile
    container_name: medusa_storefront
    restart: unless-stopped
    depends_on:
      - medusa
    ports:
      - "8000:8000"
    environment:
      - NEXT_PUBLIC_MEDUSA_BACKEND_URL=http://medusa:9000
    env_file:
      - apps/storefront/.env
    volumes:
      - .:/server
      - /server/node_modules
      - /server/apps/backend/node_modules
      - /server/apps/storefront/node_modules
      - /server/apps/storefront/.next
    entrypoint: ["sh", "scripts/dev-storefront.sh"]
    networks:
      - medusa_network

volumes:
  postgres_data:
  meili_data:

networks:
  medusa_network:
    driver: bridge
