<!-- @dsCard group="Components" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--bg);}
  body{padding:24px 26px;display:grid;grid-template-columns:1fr 1fr;gap:20px 26px;max-width:660px;}
  .lbl{font-family:var(--font-mono);font-size:10px;color:var(--fg-3);text-transform:uppercase;letter-spacing:.1em;margin-bottom:8px;}
  .field input,.field select{width:100%;font-family:var(--font-sans);font-size:14px;color:var(--fg-1);background:var(--surface);border:1.5px solid var(--border-strong);border-radius:10px;padding:11px 13px;outline:none;transition:border-color var(--dur-fast),box-shadow var(--dur-fast);}
  .field input::placeholder{color:var(--fg-4);}
  .field input:focus{border-color:var(--violet-500);box-shadow:0 0 0 3px rgb(123 97 255 / 0.18);}
  .search{position:relative;}
  .search svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);width:17px;height:17px;color:var(--fg-3);}
  .search input{padding-left:36px;border-radius:999px;}
  .stepper{display:inline-flex;align-items:center;border:1.5px solid var(--border-strong);border-radius:10px;overflow:hidden;}
  .stepper button{width:38px;height:40px;border:none;background:var(--surface);color:var(--fg-1);font-size:18px;cursor:pointer;}
  .stepper button:hover{background:rgb(20 22 15 / 0.05);}
  .stepper span{width:42px;text-align:center;font-family:var(--font-mono);font-weight:600;font-size:14px;color:var(--fg-1);}
  .toggle{display:inline-flex;align-items:center;gap:10px;font-size:14px;color:var(--fg-2);}
  .sw{width:42px;height:24px;border-radius:999px;background:var(--lime-500);position:relative;transition:background var(--dur-fast);}
  .sw::after{content:"";position:absolute;top:3px;left:21px;width:18px;height:18px;border-radius:50%;background:#fff;box-shadow:var(--shadow-sm);}
  .check{display:flex;align-items:center;gap:9px;font-size:14px;color:var(--fg-2);}
  .box{width:20px;height:20px;border-radius:6px;background:var(--violet-500);display:flex;align-items:center;justify-content:center;}
  .box svg{width:13px;height:13px;color:#fff;}
</style></head><body>
  <div class="field"><div class="lbl">Text input</div><input type="text" value="ada@clickazo.dev"></div>
  <div class="field"><div class="lbl">Search</div><div class="search"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg><input type="text" placeholder="Search tees, cubes, gadgets…"></div></div>
  <div class="field"><div class="lbl">Select / size</div><select><option>Size — M</option><option>Size — L</option></select></div>
  <div class="field"><div class="lbl">Focused</div><input type="text" value="On the money" style="border-color:var(--violet-500);box-shadow:0 0 0 3px rgb(123 97 255 / 0.18);"></div>
  <div><div class="lbl">Quantity stepper</div><div class="stepper"><button>−</button><span>2</span><button>+</button></div></div>
  <div><div class="lbl">Toggle &amp; checkbox</div><div style="display:flex;gap:20px;align-items:center;"><label class="toggle"><span class="sw"></span> Dark mode</label><label class="check"><span class="box"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg></span> Gift wrap</label></div></div>
</body></html>
