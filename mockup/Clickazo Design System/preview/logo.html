<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--bg);}
  body{padding:0;display:flex;}
  .pane{flex:1;display:flex;flex-direction:column;gap:18px;justify-content:center;padding:26px 28px;min-height:200px;}
  .pane.dark{background:var(--ink-950);}
  .lbl{font-family:var(--font-mono);font-size:10px;color:var(--fg-3);text-transform:uppercase;letter-spacing:.1em;}
  .lock{display:flex;align-items:center;gap:14px;}
  .mark{width:52px;height:52px;border-radius:14px;background:var(--lime-500);position:relative;flex:0 0 52px;}
  .mark svg{position:absolute;width:26px;height:26px;top:13px;left:13px;}
  .word{font-weight:800;font-size:34px;letter-spacing:-.04em;}
  .lt .word{color:var(--ink-900);}
  .dk .word{color:var(--ink-50);}
</style></head><body>
  <div class="pane lt">
    <span class="lbl">Logo · light</span>
    <div class="lock">
      <span class="mark"><svg viewBox="0 0 24 24"><path d="M4.037 4.688a.495.495 0 0 1 .651-.651l16 6.5a.5.5 0 0 1-.063.947l-6.124 1.58a2 2 0 0 0-1.438 1.435l-1.579 6.126a.5.5 0 0 1-.947.063z" fill="#14160F"/></svg></span>
      <span class="word">Clickazo</span>
    </div>
    <span class="mark" style="width:44px;height:44px;flex:0 0 44px;"><svg viewBox="0 0 24 24" style="width:22px;height:22px;top:11px;left:11px;"><path d="M4.037 4.688a.495.495 0 0 1 .651-.651l16 6.5a.5.5 0 0 1-.063.947l-6.124 1.58a2 2 0 0 0-1.438 1.435l-1.579 6.126a.5.5 0 0 1-.947.063z" fill="#14160F"/></svg></span>
  </div>
  <div class="pane dark dk">
    <span class="lbl">Logo · dark</span>
    <div class="lock">
      <span class="mark"><svg viewBox="0 0 24 24"><path d="M4.037 4.688a.495.495 0 0 1 .651-.651l16 6.5a.5.5 0 0 1-.063.947l-6.124 1.58a2 2 0 0 0-1.438 1.435l-1.579 6.126a.5.5 0 0 1-.947.063z" fill="#14160F"/></svg></span>
      <span class="word">Clickazo</span>
    </div>
    <span style="font-family:var(--font-mono);font-size:11px;color:var(--fg-4);">Clear space ≥ tile height · never recolor the lime · never gradient</span>
  </div>
</body></html>
