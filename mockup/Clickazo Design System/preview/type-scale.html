<!-- @dsCard group="Type" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--bg);}
  body{padding:24px 28px;}
  .row{display:flex;align-items:baseline;gap:16px;padding:7px 0;border-bottom:1px solid var(--border);}
  .row:last-child{border-bottom:none;}
  .spec{font-family:var(--font-mono);font-size:11px;color:var(--fg-3);width:120px;flex:0 0 120px;letter-spacing:.02em;}
  .specimen{color:var(--fg-1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
</style></head><body>
  <div class="row"><span class="spec">display · 84/800</span><span class="specimen" style="font-size:60px;font-weight:800;letter-spacing:-.03em;line-height:1;">Big drop</span></div>
  <div class="row"><span class="spec">h1 · 60/800</span><span class="specimen" style="font-size:46px;font-weight:800;letter-spacing:-.015em;">Code, worn well</span></div>
  <div class="row"><span class="spec">h2 · 44/700</span><span class="specimen" style="font-size:36px;font-weight:700;letter-spacing:-.015em;">New this week</span></div>
  <div class="row"><span class="spec">h3 · 32/700</span><span class="specimen" style="font-size:28px;font-weight:700;letter-spacing:-.015em;">Programmer mugs</span></div>
  <div class="row"><span class="spec">h4 · 24/700</span><span class="specimen" style="font-size:22px;font-weight:700;letter-spacing:-.015em;">Speed cubes</span></div>
  <div class="row"><span class="spec">h5 · 19/600</span><span class="specimen" style="font-size:19px;font-weight:600;">Heavyweight cotton tee</span></div>
  <div class="row"><span class="spec">h6 · 16/600</span><span class="specimen" style="font-size:16px;font-weight:600;">Add to cart</span></div>
</body></html>
