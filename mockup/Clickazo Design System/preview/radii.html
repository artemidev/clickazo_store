<!-- @dsCard group="Spacing" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--bg);}
  body{padding:24px 26px;}
  .lbl{font-family:var(--font-mono);font-size:10.5px;color:var(--fg-3);text-transform:uppercase;letter-spacing:.1em;margin-bottom:16px;}
  .row{display:flex;gap:14px;align-items:flex-end;flex-wrap:wrap;}
  .sw{display:flex;flex-direction:column;gap:8px;align-items:center;}
  .box{width:70px;height:54px;background:var(--surface);border:1.5px solid var(--border-strong);border-bottom:none;}
  .n{font-family:var(--font-mono);font-size:10px;color:var(--fg-3);}
  .n b{color:var(--fg-1);font-weight:600;}
</style></head><body>
  <div class="lbl">Corner radii — modern commerce, rounder than a dev tool</div>
  <div class="row">
    <div class="sw"><div class="box" style="border-radius:6px 6px 0 0;"></div><span class="n"><b>xs</b> 6</span></div>
    <div class="sw"><div class="box" style="border-radius:8px 8px 0 0;"></div><span class="n"><b>sm</b> 8</span></div>
    <div class="sw"><div class="box" style="border-radius:10px 10px 0 0;"></div><span class="n"><b>md</b> 10 · btn/input</span></div>
    <div class="sw"><div class="box" style="border-radius:14px 14px 0 0;"></div><span class="n"><b>lg</b> 14 · card</span></div>
    <div class="sw"><div class="box" style="border-radius:20px 20px 0 0;"></div><span class="n"><b>xl</b> 20 · modal</span></div>
    <div class="sw"><div class="box" style="border-radius:28px 28px 0 0;"></div><span class="n"><b>2xl</b> 28 · hero</span></div>
    <div class="sw"><div class="box" style="border-radius:999px 999px 0 0;"></div><span class="n"><b>pill</b> 999</span></div>
  </div>
</body></html>
