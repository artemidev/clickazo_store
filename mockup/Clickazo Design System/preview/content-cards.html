<!-- @dsCard group="Components" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--bg);}
  body{padding:24px 26px;display:flex;gap:16px;align-items:stretch;}
  .lbl{font-family:var(--font-mono);font-size:10px;color:var(--fg-3);text-transform:uppercase;letter-spacing:.1em;margin-bottom:8px;}
  .feat{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:20px;box-shadow:var(--shadow-sm);}
  .ic{width:42px;height:42px;border-radius:12px;background:var(--lime-500);display:flex;align-items:center;justify-content:center;margin-bottom:14px;}
  .ic svg{width:22px;height:22px;color:var(--ink-900);}
  .feat h4{font-size:18px;margin:0 0 5px;color:var(--fg-1);}
  .feat p{font-size:13.5px;color:var(--fg-3);margin:0;line-height:1.5;}
  .promo{flex:1;background:var(--lime-500);border-radius:20px;padding:20px;color:var(--ink-900);display:flex;flex-direction:column;justify-content:space-between;}
  .promo .eb{font-family:var(--font-mono);font-size:11px;text-transform:uppercase;letter-spacing:.12em;opacity:.7;}
  .promo h3{color:var(--ink-900);font-size:26px;margin:8px 0 0;line-height:1.05;}
  .promo a{align-self:flex-start;margin-top:16px;background:var(--ink-900);color:var(--lime-500);font-weight:600;font-size:13px;padding:9px 16px;border-radius:10px;text-decoration:none;}
</style></head><body>
  <div class="feat">
    <div class="lbl">Feature card</div>
    <div class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 18V6a2 2 0 0 0-2-2H4a2 2 0 0 0-2 2v11a1 1 0 0 0 1 1h2"/><path d="M15 18H9"/><path d="M19 18h2a1 1 0 0 0 1-1v-3.65a1 1 0 0 0-.22-.62l-3.48-4.35A1 1 0 0 0 17.52 8H14"/><circle cx="17" cy="18" r="2"/><circle cx="7" cy="18" r="2"/></svg></div>
    <h4>Free 2-day shipping</h4>
    <p>On every order over $50. Ships from Austin, tracked door to door.</p>
  </div>
  <div class="promo">
    <div>
      <span class="eb">New drop</span>
      <h3>The keyboard collection</h3>
    </div>
    <a href="#">Shop now →</a>
  </div>
</body></html>
