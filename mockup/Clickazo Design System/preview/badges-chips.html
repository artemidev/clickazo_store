<!-- @dsCard group="Components" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--bg);}
  body{padding:24px 26px;display:flex;flex-direction:column;gap:20px;}
  .lbl{font-family:var(--font-mono);font-size:10px;color:var(--fg-3);text-transform:uppercase;letter-spacing:.1em;margin-bottom:12px;}
  .row{display:flex;gap:10px;align-items:center;flex-wrap:wrap;}
  .badge{font-family:var(--font-mono);font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;padding:5px 10px;border-radius:999px;display:inline-flex;align-items:center;gap:5px;}
  .badge svg{width:12px;height:12px;}
  .chip{font-family:var(--font-sans);font-size:13px;font-weight:500;padding:7px 14px;border-radius:999px;border:1px solid var(--border-strong);color:var(--fg-2);background:var(--surface);cursor:pointer;}
  .chip.active{background:var(--ink-900);color:var(--ink-50);border-color:var(--ink-900);}
  .chip.lime{background:var(--lime-500);color:var(--ink-900);border-color:var(--lime-500);}
  .cart{position:relative;width:42px;height:42px;border-radius:10px;border:1px solid var(--border);background:var(--surface);display:flex;align-items:center;justify-content:center;color:var(--fg-1);}
  .cart svg{width:20px;height:20px;}
  .count{position:absolute;top:-6px;right:-6px;min-width:20px;height:20px;border-radius:999px;background:var(--lime-500);color:var(--ink-900);font-family:var(--font-mono);font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;padding:0 5px;border:2px solid var(--bg);}
</style></head><body>
  <div>
    <div class="lbl">Product badges</div>
    <div class="row">
      <span class="badge" style="background:var(--red-500);color:#fff;">−30%</span>
      <span class="badge" style="background:var(--lime-500);color:var(--ink-900);">New drop</span>
      <span class="badge" style="background:var(--violet-500);color:#fff;">Bestseller</span>
      <span class="badge" style="background:rgb(31 191 107 / 0.16);color:var(--green-ink);"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>In stock</span>
      <span class="badge" style="background:rgb(244 167 32 / 0.18);color:var(--amber-ink);">Only 4 left</span>
      <span class="badge" style="background:var(--surface-inset);color:var(--fg-3);">Sold out</span>
    </div>
  </div>
  <div>
    <div class="lbl">Filter chips — single active</div>
    <div class="row">
      <span class="chip active">All</span>
      <span class="chip">Apparel</span>
      <span class="chip">Desk</span>
      <span class="chip">Cubes</span>
      <span class="chip">Gadgets</span>
      <span class="chip lime">On sale</span>
    </div>
  </div>
  <div>
    <div class="lbl">Cart count</div>
    <div class="row">
      <div class="cart"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><path d="M3 6h18"/><path d="M16 10a4 4 0 0 1-8 0"/></svg><span class="count">3</span></div>
    </div>
  </div>
</body></html>
