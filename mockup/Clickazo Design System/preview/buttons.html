<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--bg);}
  body{padding:24px 26px;display:flex;flex-direction:column;gap:20px;}
  .lbl{font-family:var(--font-mono);font-size:10px;color:var(--fg-3);text-transform:uppercase;letter-spacing:.1em;margin-bottom:12px;}
  .row{display:flex;gap:12px;align-items:center;flex-wrap:wrap;}

  .btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;font-family:var(--font-sans);font-weight:600;font-size:14px;line-height:1;padding:11px 18px;min-height:42px;border-radius:10px;border:1px solid transparent;cursor:pointer;transition:transform var(--dur-fast) var(--ease-out),background-color var(--dur-fast),box-shadow var(--dur-fast);white-space:nowrap;}
  .btn svg{width:17px;height:17px;}
  .btn-primary{background:var(--primary);color:var(--primary-fg);box-shadow:var(--shadow-sm);}
  .btn-primary:hover{background:var(--primary-hover);transform:translateY(-1px);box-shadow:var(--shadow-md);}
  .btn-primary:active{background:var(--primary-press);transform:translateY(0);box-shadow:var(--shadow-sm);}
  .btn-secondary{background:var(--ink-900);color:var(--ink-50);}
  .btn-secondary:hover{transform:translateY(-1px);box-shadow:var(--shadow-md);}
  .btn-outline{background:transparent;color:var(--fg-1);border-color:var(--border-strong);}
  .btn-outline:hover{background:rgb(20 22 15 / 0.04);border-color:var(--fg-3);}
  .btn-ghost{background:transparent;color:var(--fg-1);}
  .btn-ghost:hover{background:rgb(20 22 15 / 0.06);}
  .btn-accent{background:var(--violet-500);color:#fff;}
  .btn-accent:hover{background:var(--violet-600);transform:translateY(-1px);}
  .btn-danger{background:var(--red-500);color:#fff;}
  .btn-sm{min-height:34px;padding:8px 13px;font-size:13px;border-radius:9px;}
  .btn-lg{min-height:52px;padding:15px 26px;font-size:16px;border-radius:12px;}
  .btn-icon{width:42px;padding:0;}
  .btn:disabled{opacity:.45;cursor:not-allowed;}
</style></head><body>
  <div>
    <div class="lbl">Variants — one primary (lime) per view</div>
    <div class="row">
      <button class="btn btn-primary"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><path d="M3 6h18"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>Add to cart</button>
      <button class="btn btn-secondary">Buy it now</button>
      <button class="btn btn-outline">View details</button>
      <button class="btn btn-ghost">Save for later</button>
      <button class="btn btn-accent">Track order</button>
      <button class="btn btn-danger">Remove</button>
    </div>
  </div>
  <div>
    <div class="lbl">Sizes · icon · disabled</div>
    <div class="row">
      <button class="btn btn-primary btn-sm">Small</button>
      <button class="btn btn-primary">Medium</button>
      <button class="btn btn-primary btn-lg">Large · shop the drop</button>
      <button class="btn btn-outline btn-icon" aria-label="Wishlist"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.29 1.51 4.04 3 5.5l7 7Z"/></svg></button>
      <button class="btn btn-primary" disabled>Sold out</button>
    </div>
  </div>
</body></html>
