<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--bg);}
  body{padding:24px 26px;}
  .lbl{font-family:var(--font-mono);font-size:10px;color:var(--fg-3);text-transform:uppercase;letter-spacing:.1em;margin-bottom:16px;}
  .grid{display:grid;grid-template-columns:repeat(10,1fr);gap:16px 10px;}
  .ic{display:flex;flex-direction:column;align-items:center;gap:7px;color:var(--fg-1);}
  .ic svg{width:24px;height:24px;}
  .ic span{font-family:var(--font-mono);font-size:8.5px;color:var(--fg-3);}
</style></head><body>
  <div class="lbl">Iconography — Lucide, 2px stroke, currentColor</div>
  <div class="grid" id="g"></div>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script>
    const names=['search','shopping-bag','heart','user','menu','x','star','truck','shield-check','filter','minus','plus','check','sun','moon','chevron-down','chevron-right','arrow-right','sliders-horizontal','mouse-pointer-2'];
    const g=document.getElementById('g');
    g.innerHTML=names.map(n=>`<div class="ic"><i data-lucide="${n}"></i><span>${n}</span></div>`).join('');
    lucide.createIcons();
  </script>
</body></html>
