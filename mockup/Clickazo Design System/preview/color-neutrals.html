<!-- @dsCard group="Colors" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--bg);}
  body{padding:22px 26px;}
  .lbl{font-family:var(--font-mono);font-size:10.5px;color:var(--fg-3);text-transform:uppercase;letter-spacing:.1em;margin-bottom:12px;}
  .ramp{display:flex;border-radius:10px;overflow:hidden;border:1px solid var(--border);height:64px;}
  .seg{flex:1;display:flex;align-items:flex-end;justify-content:center;padding-bottom:6px;font-family:var(--font-mono);font-size:9px;font-weight:600;}
  .keys{display:flex;margin-top:8px;}
  .keys span{flex:1;text-align:center;font-family:var(--font-mono);font-size:9.5px;color:var(--fg-3);}
</style></head><body>
  <div class="lbl">Warm neutral ramp — ink 950 → paper. Drives surfaces, borders, muted text.</div>
  <div class="ramp">
    <div class="seg" style="background:#0E0F0B;color:#F6F7F1;">950</div>
    <div class="seg" style="background:#14160F;color:#F6F7F1;">900</div>
    <div class="seg" style="background:#1C1F16;color:#F6F7F1;">800</div>
    <div class="seg" style="background:#2A2E22;color:#F6F7F1;">700</div>
    <div class="seg" style="background:#43483A;color:#F6F7F1;">600</div>
    <div class="seg" style="background:#5E6453;color:#F6F7F1;">500</div>
    <div class="seg" style="background:#838A75;color:#14160F;">400</div>
    <div class="seg" style="background:#A9AF9D;color:#14160F;">300</div>
    <div class="seg" style="background:#CDD1C4;color:#14160F;">200</div>
    <div class="seg" style="background:#DEE1D6;color:#14160F;">150</div>
    <div class="seg" style="background:#E9EBE2;color:#14160F;">100</div>
    <div class="seg" style="background:#F0F1EA;color:#14160F;">75</div>
    <div class="seg" style="background:#F6F7F1;color:#14160F;">50</div>
    <div class="seg" style="background:#FFFFFF;color:#14160F;">paper</div>
  </div>
</body></html>
