<!-- @dsCard group="Type" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--bg);}
  body{padding:24px 28px;display:flex;flex-direction:column;gap:16px;}
  .lbl{font-family:var(--font-mono);font-size:10.5px;color:var(--fg-3);text-transform:uppercase;letter-spacing:.1em;margin-bottom:8px;}
  .chips{display:flex;gap:10px;flex-wrap:wrap;align-items:center;}
  .pill{font-family:var(--font-mono);font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:.12em;padding:5px 10px;border-radius:999px;}
</style></head><body>
  <div>
    <div class="lbl">Eyebrow / label — uppercase, tracked +0.12em</div>
    <div class="chips">
      <span class="pill" style="background:var(--lime-500);color:var(--ink-900);">New drop</span>
      <span class="pill" style="background:var(--surface-inset);color:var(--fg-3);">SKU CZ-114</span>
      <span class="pill" style="border:1px solid var(--border);color:var(--fg-2);">Free shipping</span>
    </div>
  </div>
  <div>
    <div class="lbl">Price — mono, bold, tabular figures</div>
    <div style="display:flex;align-items:baseline;gap:14px;">
      <span class="price" style="font-size:34px;color:var(--fg-1);">$28</span>
      <span class="price" style="font-size:34px;color:var(--sale);">$19<span style="font-size:18px;">.60</span></span>
      <span class="price muted" style="font-size:18px;text-decoration:line-through;">$28.00</span>
    </div>
  </div>
  <div>
    <div class="lbl">Technical detail — spec line</div>
    <pre style="margin:0;font-size:12.5px;">$ npm install --save good-taste
+ added 1 package in 0.42s · 100% organic cotton</pre>
  </div>
</body></html>
